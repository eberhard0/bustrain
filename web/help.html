  sub: "How to use it", html: `
<h2>What BusTrain does</h2>
<p>Type where you want to go — a sight, an onsen, the airport ("Umi Jigoku", "Kannawa") —
and BusTrain shows the next <b>bus and train</b> that get there, which is faster and which
is cheaper, the <b>exact sign to look for on the front of the vehicle</b>, where to get
off, and it <b>notifies you before departure and before your stop</b>. Made for visitors
who can't read Japanese and don't know the stop names.</p>
<h2>📲 iPhone: enable notifications (one time, 1 minute)</h2>
<p>Apple only delivers web-app notifications when the app is installed on your Home
Screen (iOS 16.4 or newer):</p>
<ol><li>Open this site in <b>Safari</b> and tap the <b>Share</b> button
<span class="kbd">⬆︎</span> at the bottom.</li>
<li>Scroll down, tap <b>Add to Home Screen</b>, then <b>Add</b>.</li>
<li>Open <b>BusTrain from the new icon</b> — not from Safari. This matters.</li>
<li>Set any reminder (tap a 🔔 bell or "I'm taking this bus/train") and tap
<b>Allow</b>.</li></ol>
<p>Done — reminders now arrive like any app's notifications, app closed, screen locked.</p>
<div class="warn"><b>Tapped "Don't Allow" by mistake?</b> iPhone Settings →
Notifications → BusTrain → Allow Notifications.</div>
<div class="tip"><b>Android &amp; desktop:</b> just tap <b>Enable</b> on the banner and
Allow — no install required.</div>
<h2>🧭 Plan a trip</h2>
<ol><li>Open <b>Search</b>. "From" is your location automatically.</li>
<li>Type your destination in any spelling — "umi jigoku", "airport", "鉄輪".</li>
<li>Compare the <b>Bus</b> and <b>Train</b> cards and the verdict on top:
<i>"Take the train → arrive 17 min earlier, pay ¥140 more."</i> All walking is
included.</li></ol>
<ul><li><b>Map:</b> blue dot = you, 🚏 = board here (dashed line = your walk),
🎯 = get off here, 🏁 = destination. Pinch to zoom.</li>
<li><b>🪧 The vehicle sign</b> (e.g. 「大分駅前」): match these characters against the
front of the bus or train. No match → not your ride.</li>
<li><b>✓ Get off at… — the 24th stop, ~12:16</b>, then the final short walk.</li>
<li><b>🚶 Leave in 6 min</b> — when to start walking.</li></ul>
<h2>🔔 Reminders &amp; get-off alerts</h2>
<ul><li><b>Departure:</b> tap a 🔔 bell; you're notified 5–30 min before (set the lead
time in the You tab).</li>
<li><b>Get off:</b> "I'm taking this" arms an alert ~3 min before arrival — and, if the
app is open during the ride, when GPS sees you within 400 m of your stop.</li>
<li>No account needed. Logging in additionally saves trip history and your savings.</li></ul>
<div class="warn"><b>Works with the app closed:</b> scheduled reminders (push).
<b>Needs the app on screen:</b> the GPS "this is your stop" alert.</div>
<h2>❓ Good to know</h2>
<ul><li>Scheduled times only — no live delay data. Leave a margin.</li>
<li>Bus fares are exact; train fares are close estimates marked "~".</li>
<li>Coverage today: Beppu &amp; Ōita (1,400+ stops, 22 stations). More regions planned.</li>
<li>Open source on <a href="https://github.com/eberhard0/bustrain">GitHub</a>.</li></ul>` },

zh: { name: "简体中文", back: "‹ 返回应用", open: "打开 BusTrain →",
  sub: "使用指南", html: `
<h2>BusTrain 是什么</h2>

<p>Listo: los avisos llegan como los de cualquier app, con la app cerrada y la pantalla
bloqueada.</p>
<div class="warn"><b>¿Tocaste "No permitir"?</b> Ajustes → Notificaciones → BusTrain →
Permitir notificaciones.</div>
<div class="tip"><b>Android y ordenador:</b> toca <b>Enable</b> en el banner y Permitir.

<ol><li>Abre <b>Search</b>. El origen es tu ubicación automáticamente.</li>

<li>Compara las tarjetas de <b>Bus</b> y <b>Tren</b> y el veredicto:

<ul><li>Solo horarios programados, sin datos de retrasos. Deja margen.</li>
<li>Tarifas de bus exactas; las de tren son estimaciones con "~".</li>
<li>Cobertura actual: Beppu y Ōita. Más regiones en camino.</li>
<li>Código abierto en <a href="https://github.com/eberhard0/bustrain">GitHub</a>.</li></ul>` },

fr: { name: "Français", back: "‹ Retour à l'app", open: "Ouvrir BusTrain →",
  sub: "Guide d'utilisation", html: `
<h2>Ce que fait BusTrain</h2>
<p>Tapez votre destination (« Umi Jigoku », « aéroport », « Kannawa ») : BusTrain affiche
le <b>prochain bus et le prochain train</b> pour y aller, lequel est plus rapide ou moins
cher, le <b>panneau exact affiché à l'avant du véhicule</b>, où descendre, et vous
<b>prévient avant le départ et avant votre arrêt</b>. Conçu pour les visiteurs qui ne
lisent pas le japonais.</p>
<h2>📲 iPhone : activer les notifications (une fois, 1 minute)</h2>
<p>Apple ne délivre les notifications d'app web que si elle est installée sur l'écran
d'accueil (iOS 16.4 ou plus) :</p>
<ol><li>Ouvrez ce site dans <b>Safari</b> et touchez le bouton <b>Partager</b>
<span class="kbd">⬆︎</span> en bas.</li>
<li>Faites défiler, touchez <b>Sur l'écran d'accueil</b>, puis <b>Ajouter</b>.</li>
<li>Ouvrez <b>BusTrain depuis la nouvelle icône</b> — pas depuis Safari. C'est
important.</li>
<li>Créez un rappel (🔔 ou « Je prends ce bus/train ») et touchez <b>Autoriser</b>.</li></ol>
<p>C'est fait : les alertes arrivent comme celles d'une app native, app fermée, écran
verrouillé.</p>
<div class="warn"><b>« Refuser » touché par erreur ?</b> Réglages → Notifications →
BusTrain → Autoriser.</div>
<div class="tip"><b>Android et ordinateur :</b> touchez <b>Enable</b> sur la bannière puis
Autoriser. Aucune installation requise.</div>
<h2>🧭 Préparer un trajet</h2>
<ol><li>Ouvrez <b>Search</b>. Le départ est votre position, automatiquement.</li>
<li>Tapez la destination dans n'importe quelle écriture : « umi jigoku », « airport »,
« 鉄輪 ».</li>
<li>Comparez les cartes <b>Bus</b> et <b>Train</b> et le verdict :
<i>« Prenez le train → 17 min plus tôt, ¥140 de plus. »</i> Marche incluse.</li></ol>
<ul><li><b>Carte :</b> point bleu = vous, 🚏 = montée, 🎯 = descente, 🏁 = destination.</li>
<li><b>🪧 Le panneau du véhicule</b> (ex. 「大分駅前」) : comparez ces caractères avec
l'avant du bus ou du train.</li>
<li><b>✓ Descendez à… — 24ᵉ arrêt, ~12:16</b>, puis une courte marche.</li>
<li><b>🚶 Partez dans 6 min</b> — quand commencer à marcher.</li></ul>
<h2>🔔 Rappels et alerte de descente</h2>
<ul><li><b>Départ :</b> touchez 🔔 ; alerte 5 à 30 min avant (réglable dans You).</li>
<li><b>Descente :</b> « Je prends ce » arme une alerte ~3 min avant l'arrivée — et, si
l'app est ouverte pendant le trajet, quand le GPS vous voit à 400 m de votre arrêt.</li>
<li>Sans compte. Connecté, l'historique et vos économies sont aussi enregistrés.</li></ul>
<div class="warn"><b>App fermée :</b> rappels programmés (push). <b>App à l'écran :</b>
l'alerte GPS « c'est votre arrêt ».</div>
<h2>❓ À savoir</h2>
<ul><li>Horaires théoriques uniquement, pas de retards en temps réel. Prévoyez une
marge.</li>
<li>Tarifs bus exacts ; tarifs train estimés, marqués « ~ ».</li>
<li>Couverture actuelle : Beppu et Ōita. D'autres régions suivront.</li>
<li>Open source sur <a href="https://github.com/eberhard0/bustrain">GitHub</a>.</li></ul>` },

de: { name: "Deutsch", back: "‹ Zurück zur App", open: "BusTrain öffnen →",
  sub: "Anleitung", html: `
<h2>Was BusTrain macht</h2>
<p>Ziel eintippen („Umi Jigoku", „Flughafen", „Kannawa") — BusTrain zeigt den
<b>nächsten Bus und Zug</b> dorthin, was schneller und was günstiger ist, das
<b>exakte Schild vorn am Fahrzeug</b>, wo Sie aussteigen, und <b>meldet sich vor der
Abfahrt und vor Ihrer Haltestelle</b>. Gemacht für Reisende ohne Japanischkenntnisse.</p>
<h2>📲 iPhone: Mitteilungen aktivieren (einmalig, 1 Minute)</h2>
<p>Apple stellt Web-App-Mitteilungen nur zu, wenn die App auf dem Home-Bildschirm
installiert ist (iOS 16.4 oder neuer):</p>
<ol><li>Diese Seite in <b>Safari</b> öffnen und unten auf <b>Teilen</b>
<span class="kbd">⬆︎</span> tippen.</li>
<li>Nach unten scrollen, <b>Zum Home-Bildschirm</b>, dann <b>Hinzufügen</b>.</li>
<li><b>BusTrain über das neue Symbol öffnen</b> — nicht über Safari. Wichtig!</li>
<li>Eine Erinnerung setzen (🔔 oder „Ich nehme diesen Bus/Zug") und <b>Erlauben</b>
tippen.</li></ol>
<p>Fertig — Erinnerungen kommen ab jetzt wie bei jeder App an: App geschlossen,
Bildschirm gesperrt.</p>
<div class="warn"><b>Versehentlich „Nicht erlauben" getippt?</b> Einstellungen →
Mitteilungen → BusTrain → Erlauben.</div>
<div class="tip"><b>Android &amp; Desktop:</b> einfach <b>Enable</b> im Banner tippen und
zulassen — keine Installation nötig.</div>
<h2>🧭 Eine Fahrt planen</h2>
<ol><li><b>Search</b> öffnen. Start ist automatisch Ihr Standort.</li>
<li>Ziel beliebig eingeben: „umi jigoku", „airport", „鉄輪".</li>
<li><b>Bus</b>- und <b>Zug</b>-Karte plus Fazit vergleichen:
<i>„Mit dem Zug → 17 Min. früher da, ¥140 teurer."</i> Fußwege sind eingerechnet.</li></ol>
<ul><li><b>Karte:</b> blauer Punkt = Sie, 🚏 = Einstieg (gestrichelt = Fußweg),
🎯 = Ausstieg, 🏁 = Ziel.</li>
<li><b>🪧 Das Fahrzeugschild</b> (z. B. 「大分駅前」): Zeichen mit der Front des
Fahrzeugs abgleichen. Passt es nicht, ist es nicht Ihre Verbindung.</li>
<li><b>✓ Aussteigen an… — 24. Halt, ~12:16</b>, danach ein kurzer Fußweg.</li>
<li><b>🚶 In 6 Min. losgehen</b> — wann Sie starten sollten.</li></ul>
<h2>🔔 Erinnerungen &amp; Ausstiegs-Alarm</h2>
<ul><li><b>Abfahrt:</b> 🔔 antippen; Meldung 5–30 Min. vorher (im You-Tab
einstellbar).</li>
<li><b>Ausstieg:</b> „Ich nehme diesen" aktiviert einen Alarm ~3 Min. vor Ankunft — und,
wenn die App während der Fahrt offen ist, sobald GPS Sie 400 m vor Ihrer Haltestelle
sieht.</li>
<li>Kein Konto nötig. Angemeldet werden zusätzlich Fahrten und Ersparnis
gespeichert.</li></ul>
<div class="warn"><b>Bei geschlossener App:</b> geplante Erinnerungen (Push). <b>App muss
offen sein:</b> der GPS-Alarm „das ist Ihre Haltestelle".</div>
<h2>❓ Gut zu wissen</h2>
<ul><li>Nur Fahrplanzeiten, keine Echtzeit-Verspätungen. Puffer einplanen.</li>
<li>Buspreise exakt; Zugpreise sind Schätzungen mit „~".</li>
<li>Aktuell: Beppu &amp; Ōita. Weitere Regionen geplant.</li>
<li>Open Source auf <a href="https://github.com/eberhard0/bustrain">GitHub</a>.</li></ul>` },

id: { name: "Bahasa Indonesia", back: "‹ Kembali ke aplikasi", open: "Buka BusTrain →",
  sub: "Panduan penggunaan", html: `
<h2>Apa itu BusTrain</h2>
<p>Ketik tujuan Anda ("Umi Jigoku", "bandara", "Kannawa") — BusTrain menampilkan
<b>bus dan kereta berikutnya</b> ke sana, mana yang lebih cepat dan lebih murah,
<b>papan tujuan persis di depan kendaraan</b>, di mana harus turun, dan
<b>mengingatkan Anda sebelum berangkat dan sebelum halte tujuan</b>. Dibuat untuk
wisatawan yang tidak bisa membaca bahasa Jepang.</p>
<h2>📲 iPhone: aktifkan notifikasi (sekali saja, 1 menit)</h2>
<p>Apple hanya mengirim notifikasi web-app yang terpasang di Layar Utama (iOS 16.4+):</p>
<ol><li>Buka situs ini di <b>Safari</b>, ketuk tombol <b>Bagikan</b>
<span class="kbd">⬆︎</span> di bawah.</li>
<li>Gulir ke bawah, ketuk <b>Tambah ke Layar Utama</b>, lalu <b>Tambah</b>.</li>
<li>Buka <b>BusTrain dari ikon baru</b> — bukan dari Safari. Ini penting.</li>
<li>Pasang pengingat apa pun (🔔 atau "Saya naik bus/kereta ini") lalu ketuk
<b>Izinkan</b>.</li></ol>
<p>Selesai — pengingat kini tiba seperti notifikasi aplikasi biasa, walau aplikasi
tertutup dan layar terkunci.</p>
<div class="warn"><b>Tidak sengaja menekan "Jangan Izinkan"?</b> Pengaturan →
Notifikasi → BusTrain → Izinkan Notifikasi.</div>
<div class="tip"><b>Android &amp; desktop:</b> cukup ketuk <b>Enable</b> pada banner lalu
izinkan — tanpa instal.</div>
<h2>🧭 Merencanakan perjalanan</h2>
<ol><li>Buka <b>Search</b>. Titik awal otomatis lokasi Anda.</li>
<li>Ketik tujuan dengan ejaan apa pun: "umi jigoku", "airport", "鉄輪".</li>
<li>Bandingkan kartu <b>Bus</b> dan <b>Kereta</b> serta kesimpulan di atas:
<i>"Naik kereta → tiba 17 menit lebih awal, bayar ¥140 lebih."</i> Waktu jalan kaki
sudah termasuk.</li></ol>
<ul><li><b>Peta:</b> titik biru = Anda, 🚏 = naik di sini, 🎯 = turun di sini,
🏁 = tujuan.</li>
<li><b>🪧 Papan kendaraan</b> (mis. 「大分駅前」): cocokkan karakter ini dengan bagian
depan bus/kereta. Tidak cocok → bukan kendaraan Anda.</li>
<li><b>✓ Turun di… — halte ke-24, ~12:16</b>, lalu jalan kaki singkat.</li>
<li><b>🚶 Berangkat 6 menit lagi</b> — kapan mulai berjalan.</li></ul>
<h2>🔔 Pengingat &amp; alarm turun</h2>
<ul><li><b>Keberangkatan:</b> ketuk 🔔; diberi tahu 5–30 menit sebelumnya (atur di tab
You).</li>
<li><b>Turun:</b> "Saya naik ini" memasang alarm ~3 menit sebelum tiba — dan, bila
aplikasi terbuka selama perjalanan, saat GPS mendeteksi Anda 400 m dari halte.</li>
<li>Tanpa akun. Jika masuk, riwayat perjalanan dan penghematan ikut tersimpan.</li></ul>
<div class="warn"><b>Berfungsi saat aplikasi tertutup:</b> pengingat terjadwal (push).
<b>Perlu aplikasi terbuka:</b> alarm GPS "ini halte Anda".</div>
<h2>❓ Perlu diketahui</h2>
<ul><li>Hanya jadwal resmi, tanpa data keterlambatan langsung. Sisakan waktu lebih.</li>
<li>Tarif bus akurat; tarif kereta perkiraan bertanda "~".</li>
<li>Cakupan saat ini: Beppu &amp; Ōita. Wilayah lain menyusul.</li>
<li>Sumber terbuka di <a href="https://github.com/eberhard0/bustrain">GitHub</a>.</li></ul>` },
};

function pickLang() {
  const saved = localStorage.getItem("bt_lang");
  if (saved && L10N[saved]) return saved;
  const nav = (navigator.language || "en").toLowerCase();
  if (nav.startsWith("zh")) return "zh";
  const two = nav.slice(0, 2);
  return L10N[two] ? two : "en";
}
function render(lang) {
  const t = L10N[lang];
  document.documentElement.lang = lang;
  document.getElementById("sub").textContent = t.sub;
  document.getElementById("back").textContent = t.back;
  document.getElementById("content").innerHTML = t.html +
    `<p style="margin-top:24px"><a class="bigbtn" style="display:block;text-align:center;text-decoration:none" href="./">${t.open}</a></p>`;
  document.getElementById("langs").innerHTML = Object.entries(L10N)
    .map(([k, v]) => `<button class="${k === lang ? "active" : ""}" data-l="${k}">${v.name}</button>`)
    .join("");
  localStorage.setItem("bt_lang", lang);
}
document.getElementById("langs").addEventListener("click", (e) => {
  const b = e.target.closest("[data-l]");
  if (b) render(b.dataset.l);
});
render(pickLang());
</script>
</body>
</html>
